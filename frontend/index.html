<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Network Device Mapper</title>
<link rel="icon" type="image/png" href="static/logo.png" />

<!-- vis-network: zero-build force-directed graph. Vendored locally so the tool works
     on isolated/offline networks; CDN is only a fallback for decoupled hosting. -->
<script src="static/vis-network.min.js"></script>
<script>
  window.vis || document.write('<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"><\/script>');
</script>

<style>
  :root {
    --bg: #0f172a;          /* slate-900 */
    --panel: #1e293b;       /* slate-800 */
    --panel-2: #273449;
    --text: #e2e8f0;        /* slate-200 */
    --muted: #94a3b8;       /* slate-400 */
    --accent: #38bdf8;      /* sky-400  */
    --gateway: #f59e0b;     /* amber-500 */
    --self: #34d399;        /* emerald-400 */
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .logo {
    width: 44px; height: 44px; border-radius: 50%;
    box-shadow: 0 0 18px rgba(124, 108, 246, .45);  /* soft glow matching the mark */
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 400; letter-spacing: .3px; }
  header h1 strong { font-weight: 800; }
  header .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
  button {
    background: var(--accent); color: #082f49; border: 0; border-radius: 8px;
    padding: 9px 16px; font-weight: 600; cursor: pointer; font-size: 14px;
    transition: opacity .15s;
  }
  button:hover { opacity: .9; }
  button:disabled { opacity: .5; cursor: progress; }
  button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }

  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  #rangeInput {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; font-size: 14px; width: 230px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  #rangeInput::placeholder { color: var(--muted); font-family: -apple-system, sans-serif; }
  #rangeInput:focus { outline: none; border-color: var(--accent); }

  .layout { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; padding: 16px 24px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .card h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin: 0; padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .export-btn {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600;
    letter-spacing: .04em; cursor: pointer; text-transform: none;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }
  .export-btn:disabled { opacity: .4; cursor: not-allowed; }
  /* Fill most of the viewport so the graph is large and readable. */
  #topology { height: calc(100vh - 200px); min-height: 560px; background: radial-gradient(circle at 50% 40%, #16233b, var(--bg)); }

  /* Keep the device list compact; scroll internally instead of growing tall. */
  #tableWrap { max-height: calc(100vh - 150px); overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th { position: sticky; top: 0; background: var(--panel); z-index: 1; }
  th, td { text-align: left; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
  tr:hover td { background: var(--panel-2); }
  td.ip { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--accent); }
  td.mac { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); font-size: 12px; }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px;
    border-radius: 5px; margin-left: 6px; vertical-align: middle;
  }
  .badge.gw { background: var(--gateway); color: #422006; }
  .badge.self { background: var(--self); color: #064e3b; }
  .badge.new { background: #f472b6; color: #500724; }

  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }
  th .arrow { font-size: 9px; margin-left: 4px; }

  #filterInput {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; width: 150px;
    text-transform: none; letter-spacing: normal; font-weight: 400;
  }
  #filterInput::placeholder { color: var(--muted); }
  #filterInput:focus { outline: none; border-color: var(--accent); }
  .card h2 .tools { display: flex; align-items: center; gap: 8px; }

  .missing {
    padding: 10px 16px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
  }
  .missing strong { color: var(--text); font-weight: 600; }
  .missing li { margin: 3px 0; }
  .missing ul { margin: 6px 0 0; padding-left: 18px; }

  .devicon { margin-right: 6px; }
  td.ping { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--muted); }
  td.ping.slow { color: var(--gateway); }

  .edit-btn {
    background: none; border: 0; color: var(--muted); cursor: pointer;
    font-size: 13px; padding: 0 4px; opacity: 0; transition: opacity .1s;
  }
  tr:hover .edit-btn { opacity: 1; }
  .edit-btn:hover { color: var(--accent); }

  #autoSelect {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 8px; font-size: 13px; cursor: pointer;
  }
  #autoSelect:focus { outline: none; border-color: var(--accent); }

  /* Device edit modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(2, 6, 23, .6); z-index: 50;
    display: flex; align-items: center; justify-content: center;
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; width: 400px; max-width: 92vw; box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .modal h3 { margin: 0 0 6px; font-size: 15px; }
  .modal .device-info {
    color: var(--muted); font-size: 12px; margin-bottom: 12px; line-height: 1.6;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .modal label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
  .modal input, .modal textarea {
    width: 100%; box-sizing: border-box; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    font-size: 14px; font-family: inherit; resize: vertical;
  }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; align-items: center; }
  .modal-actions .spacer { flex: 1; }
  .modal-status { margin-top: 10px; font-size: 12px; color: var(--muted); min-height: 16px; }
  .modal select {
    width: 100%; box-sizing: border-box; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 14px;
  }
  .modal label.check {
    display: flex; align-items: center; gap: 8px; color: var(--text);
    font-size: 13px; margin: 12px 0 0; cursor: pointer;
  }
  .modal input[type="checkbox"] { width: auto; accent-color: var(--accent); }

  #watchBtn.active { border-color: var(--accent); color: var(--accent); }

  /* Presence timeline in the device modal */
  .uptime { font-size: 12px; color: var(--muted); margin: 2px 0 6px; }
  .strip { display: flex; gap: 2px; margin-bottom: 8px; }
  .strip span { flex: 1; max-width: 8px; height: 12px; border-radius: 2px; background: var(--panel-2); }
  .strip span.on { background: var(--self); }
  .strip span.off { background: #b45309; }

  .legend { display: flex; gap: 16px; padding: 6px 16px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
  .legend span::before { content: "●"; margin-right: 5px; }
  .dot-gw::before { color: var(--gateway); }
  .dot-sw::before { color: #a78bfa; }
  .dot-ap::before { color: #22d3ee; }
  .dot-self::before { color: var(--self); }
  .dot-dev::before { color: var(--accent); }

  .status { padding: 24px; text-align: center; color: var(--muted); }
  .topo-status {
    display: flex; align-items: center; justify-content: center;
    height: 100%; padding: 24px; text-align: center; color: var(--muted);
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <img class="logo" src="static/logo.png" alt=""
           onerror="this.style.display='none'" />
      <div>
        <h1><strong>Network</strong> Device Mapper</h1>
        <div class="meta" id="meta">Ready to scan.</div>
      </div>
    </div>
    <div class="controls">
      <input id="rangeInput" type="text" spellcheck="false"
             placeholder="e.g. 192.168.1.0/24 or 10.0.0.1-50" />
      <button id="rangeBtn" class="secondary">Scan range</button>
      <button id="scanBtn">Scan my network</button>
      <select id="autoSelect" title="Automatically repeat the last scan">
        <option value="0">Auto: off</option>
        <option value="60">Auto: 1 min</option>
        <option value="300">Auto: 5 min</option>
        <option value="900">Auto: 15 min</option>
      </select>
      <button id="watchBtn" class="secondary"
              title="Background watch: scheduled scans + notifications">⏱ Watch</button>
    </div>
  </header>

  <!-- Background watch settings -->
  <div id="watchOverlay" class="overlay hidden">
    <div class="modal">
      <h3>⏱ Background watch</h3>
      <div class="device-info">Scans on a schedule while the app is running and
        notifies you when devices join (or vanish from) the network.</div>
      <label class="check"><input type="checkbox" id="watchEnabled" /> Enable background watch</label>
      <label for="watchInterval">Scan every</label>
      <select id="watchInterval">
        <option value="5">5 minutes</option>
        <option value="15">15 minutes</option>
        <option value="30">30 minutes</option>
        <option value="60">60 minutes</option>
      </select>
      <label for="watchTarget">Target (blank = my network)</label>
      <input id="watchTarget" type="text" spellcheck="false" placeholder="e.g. 192.168.1.0/24" />
      <label class="check"><input type="checkbox" id="watchNotifyNew" /> Notify when a new device joins</label>
      <label class="check"><input type="checkbox" id="watchNotifyMissing" /> Notify when a device goes missing</label>
      <label for="watchWebhook">Webhook URL (optional)</label>
      <input id="watchWebhook" type="text" spellcheck="false"
             placeholder="https://…  (receives JSON {title, message})" />
      <div class="modal-actions">
        <button id="watchCancel" class="secondary">Cancel</button>
        <span class="spacer"></span>
        <button id="watchSave">Save</button>
      </div>
      <div class="modal-status" id="watchStatus"></div>
    </div>
  </div>

  <!-- Device edit modal: custom name, notes, Wake-on-LAN -->
  <div id="modalOverlay" class="overlay hidden">
    <div class="modal">
      <h3 id="modalTitle">Edit device</h3>
      <div class="device-info" id="modalInfo"></div>
      <div id="modalHistory"></div>
      <label for="modalName">Name</label>
      <input id="modalName" type="text" placeholder="e.g. Living Room TV" maxlength="64" />
      <label for="modalNotes">Notes</label>
      <textarea id="modalNotes" rows="3" maxlength="500"
                placeholder="e.g. static IP, port 8 on the office switch"></textarea>
      <div class="modal-actions">
        <button id="modalWake" class="secondary" title="Send a Wake-on-LAN magic packet">⚡ Wake</button>
        <span class="spacer"></span>
        <button id="modalCancel" class="secondary">Cancel</button>
        <button id="modalSave">Save</button>
      </div>
      <div class="modal-status" id="modalStatus"></div>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <h2>Topology <button id="exportPngBtn" class="export-btn" disabled>⬇ PNG</button></h2>
      <div id="topology"></div>
      <div class="legend">
        <span class="dot-gw">Gateway</span>
        <span class="dot-sw">Switch</span>
        <span class="dot-ap">Access point</span>
        <span class="dot-self">This device</span>
        <span class="dot-dev">Device</span>
      </div>
    </div>

    <div class="card">
      <h2>Devices
        <span class="tools">
          <input id="filterInput" type="text" placeholder="Filter…" spellcheck="false" />
          <button id="exportCsvBtn" class="export-btn" disabled>⬇ CSV</button>
        </span>
      </h2>
      <div id="tableWrap">
        <div class="status">Click “Scan network” to discover devices.</div>
      </div>
      <div id="missingWrap"></div>
    </div>
  </div>

<script>
  // Point this at your scanner API if the widget is hosted elsewhere.
  const API_BASE = "";
  // If the server sets NDM_API_TOKEN, open the widget as /?token=YOURTOKEN and it's
  // forwarded on every API call.
  const API_TOKEN = new URLSearchParams(location.search).get("token") || "";

  const scanBtn = document.getElementById("scanBtn");
  const rangeBtn = document.getElementById("rangeBtn");
  const rangeInput = document.getElementById("rangeInput");
  const filterInput = document.getElementById("filterInput");
  const meta = document.getElementById("meta");
  const tableWrap = document.getElementById("tableWrap");
  const missingWrap = document.getElementById("missingWrap");
  const exportCsvBtn = document.getElementById("exportCsvBtn");
  const exportPngBtn = document.getElementById("exportPngBtn");
  let network = null;
  let lastData = null;       // most recent scan result, for exports
  let lastScanTarget;        // last scanned target (null = local LAN); undefined = never scanned
  let sortKey = "ip";        // current table sort column
  let sortAsc = true;

  scanBtn.addEventListener("click", () => runScan(null));
  rangeBtn.addEventListener("click", () => runScan(rangeInput.value.trim()));
  rangeInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") runScan(rangeInput.value.trim());
  });
  filterInput.addEventListener("input", () => renderTable(currentDevices()));
  exportCsvBtn.addEventListener("click", exportCsv);
  exportPngBtn.addEventListener("click", exportPng);

  function currentDevices() {
    return (lastData && lastData.devices) || [];
  }

  const topologyEl = document.getElementById("topology");
  let centering = false; // reentrancy guard: moveTo/fit must not recurse via events

  // Place the midpoint of all nodes at the viewport center. When keepScale is true we
  // preserve the user's current zoom (used while zooming); otherwise we compute the
  // largest scale that still shows every node *and its label* — vis's own fit()
  // ignores label width and the container aspect ratio, so it leaves big margins.
  function centerGraph(keepScale) {
    if (!network || centering) return;
    centering = true;
    try {
      // Make sure the canvas matches the container before measuring.
      network.setSize(topologyEl.clientWidth + "px", topologyEl.clientHeight + "px");
      const pts = Object.values(network.getPositions());
      if (!pts.length) return;
      const xs = pts.map((p) => p.x), ys = pts.map((p) => p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;

      if (keepScale) {
        network.moveTo({ position: { x: cx, y: cy }, scale: network.getScale(), animation: false });
        return;
      }

      const w = topologyEl.clientWidth, h = topologyEl.clientHeight;
      if (!w || !h) return;
      // Pad the node cloud for the node radius + labels (which extend well past the
      // node centers, especially the long "Vendor device" strings) so nothing clips.
      const padX = 170, padY = 70;
      const contentW = (maxX - minX) + padX * 2;
      const contentH = (maxY - minY) + padY * 2;
      // Cap the zoom so a tiny graph (1–2 nodes) doesn't blow up comically large.
      const scale = Math.min(w / contentW, h / contentH, 1.6);
      network.moveTo({ position: { x: cx, y: cy }, scale, animation: false });
    } finally {
      centering = false;
    }
  }

  // Re-center on ANY container size change (window resize, panel drag, layout reflow).
  // A ResizeObserver on the container is far more reliable than window's resize event.
  new ResizeObserver(() => {
    if (!network) return;
    network.setSize(topologyEl.clientWidth + "px", topologyEl.clientHeight + "px");
    requestAnimationFrame(() => centerGraph(false));
  }).observe(topologyEl);

  // target === null -> auto-detect local LAN; otherwise scan the given CIDR/range.
  async function runScan(target) {
    if (target === "") {
      meta.textContent = "Enter an IP range first (e.g. 192.168.1.0/24).";
      return;
    }
    lastScanTarget = target;  // remembered for the auto-rescan timer
    setBusy(true);
    const what = target || "your local network";
    meta.textContent = `Sweeping ${what} — this can take a few seconds.`;
    tableWrap.innerHTML = '<div class="status">Scanning…</div>';
    missingWrap.innerHTML = "";
    // Clear the previous network's graph immediately so stale nodes never linger.
    clearTopology(`Scanning ${escapeHtml(what)}…`);
    try {
      const qs = new URLSearchParams({ force: "true" });
      if (target) qs.set("target", target);
      if (API_TOKEN) qs.set("token", API_TOKEN);
      render(await scanWithProgress(qs));
    } catch (err) {
      meta.textContent = "Scan failed.";
      tableWrap.innerHTML = `<div class="status">⚠️ ${escapeHtml(err.message)}</div>`;
      clearTopology(`⚠️ ${escapeHtml(err.message)}`);
    } finally {
      setBusy(false);
    }
  }

  // Scan over SSE for live progress; falls back to the plain JSON endpoint when
  // the stream can't be established (old browser, buffering proxy, or an HTTP
  // error — the fallback fetch then surfaces the real error message).
  function scanWithProgress(qs) {
    return new Promise((resolve, reject) => {
      if (!window.EventSource) return scanPlain(qs).then(resolve, reject);
      const es = new EventSource(`${API_BASE}/api/scan/stream?${qs}`);
      let settled = false;
      es.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.event === "progress") {
          showProgress(msg);
        } else if (msg.event === "done") {
          settled = true; es.close(); resolve(msg.result);
        } else if (msg.event === "error") {
          settled = true; es.close(); reject(new Error(msg.message));
        }
      };
      es.onerror = () => {
        es.close();
        if (!settled) { settled = true; scanPlain(qs).then(resolve, reject); }
      };
    });
  }

  async function scanPlain(qs) {
    const res = await fetch(`${API_BASE}/api/scan?${qs}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || data.detail || `HTTP ${res.status}`);
    return data;
  }

  const PHASE_LABEL = {
    sweep: (m) => `Sweeping — ${m.done}/${m.total} hosts pinged…`,
    enrich: (m) => `Resolving device names — ${m.done}/${m.total}…`,
    topology: () => "Querying switch topology (SNMP/UniFi)…",
  };

  function showProgress(msg) {
    const fmt = PHASE_LABEL[msg.phase];
    if (fmt) meta.textContent = fmt(msg);
  }

  // Destroy any existing graph and show a centered message in its place.
  function clearTopology(message) {
    if (network) { network.destroy(); network = null; }
    document.getElementById("topology").innerHTML =
      `<div class="topo-status">${message || ""}</div>`;
  }

  function setBusy(busy) {
    scanBtn.disabled = rangeBtn.disabled = busy;
    scanBtn.textContent = busy ? "Scanning…" : "Scan my network";
  }

  function render(data) {
    const devices = data.devices || [];
    lastData = data;
    exportCsvBtn.disabled = !devices.length;
    exportPngBtn.disabled = !devices.length || data.reachable === false;

    // Network couldn't be reached at all -> explicit unreachable state, no graph/table.
    if (data.reachable === false) {
      const msg = data.note || `${data.network_cidr || "Network"} is unreachable.`;
      meta.textContent = `⚠️ ${msg}`;
      tableWrap.innerHTML = `<div class="status">🚫 ${escapeHtml(msg)}</div>`;
      clearTopology(`🚫 ${escapeHtml(msg)}`);
      return;
    }

    const SOURCE_LABEL = { snmp: "physical topology · SNMP", unifi: "physical topology · UniFi" };
    const realTopo = data.topology_source && data.topology_source !== "l3-star";
    const view = realTopo
      ? (SOURCE_LABEL[data.topology_source] || "physical topology")
      : "logical view (no switch data)";
    const summary = devices.length
      ? `${devices.length} devices on ${data.network_cidr || "?"} · ${view}`
      : (data.note || `No devices found on ${data.network_cidr || "?"}.`);
    meta.textContent = summary;
    renderTable(devices);
    renderMissing(data.missing_devices || []);
    renderTopology(data);
  }

  // ---- Device table: filterable + sortable ----------------------------------

  const COLUMNS = [
    { key: "label",      title: "Device" },
    { key: "ip",         title: "IP address" },
    { key: "mac",        title: "MAC" },
    { key: "vendor",     title: "Vendor" },
    { key: "latency_ms", title: "Ping" },
  ];

  // Numeric IP/latency sort; everything else case-insensitive text, blanks last.
  function sortValue(d, key) {
    if (key === "ip") {
      return d.ip.split(".").reduce((n, o) => n * 256 + (+o), 0);
    }
    if (key === "latency_ms") {
      return d.latency_ms == null ? Infinity : d.latency_ms;
    }
    const v = d[key];
    return v ? String(v).toLowerCase() : "￿";
  }

  // Device-type icon: role first (authoritative), then hostname/vendor keywords.
  const ICON_RULES = [
    [/iphone|ipad|pixel|galaxy|oneplus|android|smartphone/, "📱"],
    [/macbook|laptop|thinkpad|notebook/, "💻"],
    [/apple.?tv|roku|chromecast|bravia|firetv|shield|vizio|\btv\b/, "📺"],
    [/playstation|sony interactive|nintendo|xbox/, "🎮"],
    [/printer|xerox|brother industries|seiko epson|canon|lexmark/, "🖨️"],
    [/truenas|synology|qnap|unraid|fileserver|\bnas\b/, "🗄️"],
    [/doorbell|camera|\bcam\b|ring\b|wyze|hikvision|reolink|axis comm/, "📷"],
    [/sonos|homepod|\becho\b|speaker|denon|yamaha/, "🔊"],
    [/espressif|tuya|shelly|tasmota|nanoleaf|hue|lifx|wemo|sensor|plug/, "💡"],
    [/roomba|irobot|roborock|vacuum/, "🤖"],
    [/raspberry/, "🍓"],
    [/vmware|virtualbox|qemu|proxmox|parallels/, "🖥️"],
    [/ubiquiti|tp-link|netgear|cisco|mikrotik|aruba|zyxel/, "📡"],
    [/idrac|\bipmi\b|ilo\b/, "🔧"],
    [/dell|hewlett|asus|asrock|micro-star|gigabyte|intel corp|lenovo|acer/, "🖥️"],
    [/apple/, "🍎"],
  ];

  function deviceIcon(d) {
    if (d.is_gateway || d.role === "gateway") return "🌐";
    if (d.role === "switch") return "🔀";
    if (d.role === "ap") return "📶";
    const hay = `${d.label || ""} ${d.hostname || ""} ${d.unifi_name || ""} ${d.vendor || ""}`.toLowerCase();
    for (const [re, icon] of ICON_RULES) if (re.test(hay)) return icon;
    return "💻";
  }

  function pingCell(d) {
    if (d.latency_ms == null) return '<td class="ping">—</td>';
    const slow = d.latency_ms > 100 ? " slow" : "";
    return `<td class="ping${slow}">${d.latency_ms.toFixed(1)} ms</td>`;
  }

  function setSort(key) {
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    renderTable(currentDevices());
  }

  function renderTable(devices) {
    const q = filterInput.value.trim().toLowerCase();
    let shown = devices;
    if (q) {
      shown = devices.filter((d) =>
        [d.label, d.ip, d.mac, d.vendor, d.role]
          .some((v) => v && String(v).toLowerCase().includes(q)));
    }
    if (!shown.length) {
      tableWrap.innerHTML = `<div class="status">${
        devices.length ? "No devices match the filter." : "No devices found."}</div>`;
      return;
    }
    shown = [...shown].sort((a, b) => {
      const va = sortValue(a, sortKey), vb = sortValue(b, sortKey);
      const cmp = va < vb ? -1 : va > vb ? 1 : 0;
      return sortAsc ? cmp : -cmp;
    });

    const head = COLUMNS.map((c) => {
      const arrow = c.key === sortKey ? `<span class="arrow">${sortAsc ? "▲" : "▼"}</span>` : "";
      return `<th class="sortable" data-key="${c.key}">${c.title}${arrow}</th>`;
    }).join("");
    const rows = shown.map((d, i) => {
      const badges =
        (d.is_gateway ? '<span class="badge gw">GATEWAY</span>' : "") +
        (d.is_self ? '<span class="badge self">THIS PC</span>' : "") +
        (d.is_new && !d.is_self ? '<span class="badge new" title="First time seen on this network">NEW</span>' : "");
      const noteMark = d.notes ? ` <span title="${escapeHtml(d.notes)}">🗒</span>` : "";
      return `<tr>
        <td><span class="devicon">${deviceIcon(d)}</span>${escapeHtml(d.label)}${badges}${noteMark}
            <button class="edit-btn" data-idx="${i}" title="Rename / notes / wake">✎</button></td>
        <td class="ip">${escapeHtml(d.ip)}</td>
        <td class="mac">${escapeHtml(d.mac || "—")}</td>
        <td>${escapeHtml(d.vendor || "—")}</td>
        ${pingCell(d)}
      </tr>`;
    }).join("");
    tableWrap.innerHTML = `<table>
      <thead><tr>${head}</tr></thead>
      <tbody>${rows}</tbody></table>`;
    tableWrap.querySelectorAll("th.sortable").forEach((th) =>
      th.addEventListener("click", () => setSort(th.dataset.key)));
    tableWrap.querySelectorAll(".edit-btn").forEach((btn) =>
      btn.addEventListener("click", () => openModal(shown[+btn.dataset.idx])));
  }

  // Devices seen on this network in past scans but absent from this one.
  function renderMissing(missing) {
    if (!missing.length) { missingWrap.innerHTML = ""; return; }
    const items = missing.slice(0, 15).map((m) => {
      const who = m.label || m.ip || m.mac;
      const detail = [m.ip, m.mac].filter((v) => v && v !== who).join(" · ");
      return `<li>${escapeHtml(who)}${detail ? ` <span>(${escapeHtml(detail)})</span>` : ""}
        — last seen ${relTime(m.last_seen)}</li>`;
    }).join("");
    const more = missing.length > 15 ? `<li>…and ${missing.length - 15} more</li>` : "";
    missingWrap.innerHTML = `<div class="missing">
      <strong>${missing.length} device${missing.length > 1 ? "s" : ""} not seen this scan</strong>
      <ul>${items}${more}</ul></div>`;
  }

  function relTime(ts) {
    const s = Math.max(0, Date.now() / 1000 - ts);
    if (s < 90) return "moments ago";
    if (s < 5400) return `${Math.round(s / 60)} min ago`;
    if (s < 129600) return `${Math.round(s / 3600)} h ago`;
    return `${Math.round(s / 86400)} days ago`;
  }

  // ---- Device edit modal (name / notes / wake) -------------------------------

  const modalOverlay = document.getElementById("modalOverlay");
  const modalTitle = document.getElementById("modalTitle");
  const modalInfo = document.getElementById("modalInfo");
  const modalName = document.getElementById("modalName");
  const modalNotes = document.getElementById("modalNotes");
  const modalStatus = document.getElementById("modalStatus");
  const modalWake = document.getElementById("modalWake");
  let modalDevice = null;

  function apiHeaders() {
    const h = { "Content-Type": "application/json" };
    if (API_TOKEN) h["X-API-Token"] = API_TOKEN;
    return h;
  }

  // What the label falls back to when there's no custom name (mirrors the backend).
  function derivedLabel(d) {
    return d.unifi_name || d.hostname ||
           (d.vendor ? `${d.vendor} device` : d.ip);
  }

  function deviceKey(d) {
    return d.mac ? d.mac.toLowerCase() : d.ip;
  }

  function openModal(d) {
    modalDevice = d;
    modalTitle.textContent = `${deviceIcon(d)} ${derivedLabel(d)}`;
    modalInfo.textContent = [d.ip, d.mac, d.vendor].filter(Boolean).join("  ·  ");
    modalName.value = d.custom_name || "";
    modalNotes.value = d.notes || "";
    modalStatus.textContent = "";
    modalWake.disabled = !d.mac;
    modalWake.title = d.mac ? "Send a Wake-on-LAN magic packet"
                            : "No MAC known for this device";
    modalOverlay.classList.remove("hidden");
    modalName.focus();
    loadDeviceHistory(d);
  }

  // Presence timeline: one tick per scan over the last 7 days, plus uptime %.
  const modalHistory = document.getElementById("modalHistory");

  async function loadDeviceHistory(d) {
    modalHistory.innerHTML = "";
    if (!lastData || !lastData.network_cidr) return;
    try {
      const qs = new URLSearchParams({
        key: deviceKey(d), network: lastData.network_cidr, hours: "168",
      });
      const res = await fetch(`${API_BASE}/api/device-history?${qs}`, { headers: apiHeaders() });
      if (!res.ok) return;
      const h = await res.json();
      if (modalDevice !== d || !h.points || h.points.length < 2) return;
      const seen = h.points.filter((p) => p.seen).length;
      const pct = Math.round(h.availability * 100);
      const ticks = h.points.slice(-96).map((p) =>
        `<span class="${p.seen ? "on" : "off"}"
               title="${new Date(p.ts * 1000).toLocaleString()} — ${p.seen ? "seen" : "missed"}"></span>`
      ).join("");
      modalHistory.innerHTML =
        `<div class="uptime">Seen in ${seen} of ${h.points.length} scans (${pct}%) · last 7 days</div>
         <div class="strip">${ticks}</div>`;
    } catch { /* history is a bonus; never block the modal */ }
  }

  function closeModal() {
    modalOverlay.classList.add("hidden");
    modalDevice = null;
  }

  document.getElementById("modalCancel").addEventListener("click", closeModal);
  modalOverlay.addEventListener("click", (e) => {
    if (e.target === modalOverlay) closeModal();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (modalDevice) closeModal();
    if (watchOpen) closeWatch();
  });

  document.getElementById("modalSave").addEventListener("click", async () => {
    if (!modalDevice) return;
    const d = modalDevice;
    modalStatus.textContent = "Saving…";
    try {
      const res = await fetch(`${API_BASE}/api/device-meta`, {
        method: "POST",
        headers: apiHeaders(),
        body: JSON.stringify({
          key: deviceKey(d),
          custom_name: modalName.value.trim(),
          notes: modalNotes.value.trim(),
        }),
      });
      const body = await res.json();
      if (!res.ok) throw new Error(body.detail || `HTTP ${res.status}`);
      d.custom_name = modalName.value.trim() || undefined;
      d.notes = modalNotes.value.trim() || undefined;
      d.label = d.custom_name || derivedLabel(d);
      closeModal();
      render(lastData);  // refresh table + topology labels
    } catch (err) {
      modalStatus.textContent = `⚠️ ${err.message}`;
    }
  });

  modalWake.addEventListener("click", async () => {
    if (!modalDevice || !modalDevice.mac) return;
    modalStatus.textContent = "Sending magic packet…";
    try {
      const res = await fetch(`${API_BASE}/api/wol`, {
        method: "POST",
        headers: apiHeaders(),
        body: JSON.stringify({ mac: modalDevice.mac }),
      });
      const body = await res.json();
      if (!res.ok) throw new Error(body.detail || `HTTP ${res.status}`);
      modalStatus.textContent = "⚡ Magic packet sent. The device may take ~30s to wake.";
    } catch (err) {
      modalStatus.textContent = `⚠️ ${err.message}`;
    }
  });

  // ---- Background watch settings ---------------------------------------------

  const watchBtn = document.getElementById("watchBtn");
  const watchOverlay = document.getElementById("watchOverlay");
  const watchEnabled = document.getElementById("watchEnabled");
  const watchInterval = document.getElementById("watchInterval");
  const watchTarget = document.getElementById("watchTarget");
  const watchNotifyNew = document.getElementById("watchNotifyNew");
  const watchNotifyMissing = document.getElementById("watchNotifyMissing");
  const watchWebhook = document.getElementById("watchWebhook");
  const watchStatus = document.getElementById("watchStatus");
  let watchOpen = false;

  async function fetchWatch() {
    try {
      const res = await fetch(`${API_BASE}/api/scheduler`, { headers: apiHeaders() });
      return res.ok ? await res.json() : null;
    } catch { return null; }
  }

  function updateWatchBtn(st) {
    if (st && st.enabled) {
      watchBtn.textContent = `⏱ Watch: ${st.interval_min}m`;
      watchBtn.classList.add("active");
    } else {
      watchBtn.textContent = "⏱ Watch";
      watchBtn.classList.remove("active");
    }
  }
  fetchWatch().then(updateWatchBtn);

  watchBtn.addEventListener("click", async () => {
    const st = await fetchWatch();
    if (!st) {
      meta.textContent = "Watch unavailable — is the history DB disabled (NDM_DB=off)?";
      return;
    }
    watchEnabled.checked = st.enabled;
    // Select the configured interval, adding a custom option if needed (env-set).
    if (![...watchInterval.options].some((o) => +o.value === st.interval_min)) {
      watchInterval.add(new Option(`${st.interval_min} minutes`, st.interval_min));
    }
    watchInterval.value = String(st.interval_min);
    watchTarget.value = st.target || "";
    watchNotifyNew.checked = st.notify_new;
    watchNotifyMissing.checked = st.notify_missing;
    watchWebhook.value = st.webhook_url || "";
    watchStatus.textContent = st.last_run
      ? `Last run ${relTime(st.last_run)} — ${st.last_summary || ""}`
      : "Hasn't run yet.";
    watchOpen = true;
    watchOverlay.classList.remove("hidden");
  });

  function closeWatch() {
    watchOverlay.classList.add("hidden");
    watchOpen = false;
  }
  document.getElementById("watchCancel").addEventListener("click", closeWatch);
  watchOverlay.addEventListener("click", (e) => {
    if (e.target === watchOverlay) closeWatch();
  });

  document.getElementById("watchSave").addEventListener("click", async () => {
    watchStatus.textContent = "Saving…";
    try {
      const res = await fetch(`${API_BASE}/api/scheduler`, {
        method: "POST",
        headers: apiHeaders(),
        body: JSON.stringify({
          enabled: watchEnabled.checked,
          interval_min: parseInt(watchInterval.value, 10),
          target: watchTarget.value.trim(),
          notify_new: watchNotifyNew.checked,
          notify_missing: watchNotifyMissing.checked,
          webhook_url: watchWebhook.value.trim(),
        }),
      });
      const st = await res.json();
      if (!res.ok) throw new Error(st.detail || `HTTP ${res.status}`);
      updateWatchBtn(st);
      closeWatch();
    } catch (err) {
      watchStatus.textContent = `⚠️ ${err.message}`;
    }
  });

  // ---- Auto-rescan -----------------------------------------------------------

  const autoSelect = document.getElementById("autoSelect");
  let autoTimer = null;
  autoSelect.value = localStorage.getItem("ndm-auto-rescan") || "0";
  if (![...autoSelect.options].some((o) => o.value === autoSelect.value)) {
    autoSelect.value = "0";
  }
  autoSelect.addEventListener("change", applyAutoRescan);

  function applyAutoRescan() {
    localStorage.setItem("ndm-auto-rescan", autoSelect.value);
    if (autoTimer) clearInterval(autoTimer);
    autoTimer = null;
    const seconds = parseInt(autoSelect.value, 10);
    if (seconds > 0) {
      autoTimer = setInterval(() => {
        // Repeat the last scan; skip if one hasn't run yet or is in flight.
        if (lastScanTarget !== undefined && !scanBtn.disabled) {
          runScan(lastScanTarget);
        }
      }, seconds * 1000);
    }
  }
  applyAutoRescan();

  function renderTopology(data) {
    const devices = data.devices || [];
    const gatewayIp = data.gateway_ip;

    if (!devices.length) {
      clearTopology(`No devices found on ${escapeHtml(data.network_cidr || "the target")}.`);
      return;
    }

    const nodes = [];
    const edges = [];
    const realTopology = data.topology_source && data.topology_source !== "l3-star";

    // Stable node id: prefer MAC (UniFi adjacency is keyed by MAC), fall back to IP.
    const idSet = new Set(devices.map(idOf));

    if (realTopology) {
      // Draw the true hierarchy: each device links to its parent (uplink_mac).
      const gwDev = devices.find((d) => d.is_gateway);
      const gwId = gwDev ? idOf(gwDev) : null;
      for (const d of devices) nodes.push(nodeFor(d));
      for (const d of devices) {
        if (d.is_gateway) continue; // root, no parent
        const parent = (d.uplink_mac || "").toLowerCase();
        if (parent && parent !== idOf(d) && idSet.has(parent)) {
          edges.push({ from: parent, to: idOf(d), color: { color: "#334155" }, width: 1.5 });
        } else if (gwId && idOf(d) !== gwId) {
          // UniFi doesn't track this device's uplink -> attach to gateway, dashed to
          // signal it's inferred (not real adjacency).
          edges.push({ from: gwId, to: idOf(d), color: { color: "#334155" }, width: 1, dashes: true });
        }
      }
    } else {
      // L3 fallback: hub-and-spoke off the gateway (no physical wiring available).
      const gwDev = devices.find((d) => d.is_gateway);
      let hub = gwDev ? idOf(gwDev) : null;
      if (!gwDev && gatewayIp) {
        nodes.push(gatewayNode({ ip: gatewayIp, label: "Gateway" }));
        idSet.add(gatewayIp);
        hub = gatewayIp;
      }
      if (!hub && devices[0]) hub = idOf(devices[0]);
      for (const d of devices) {
        nodes.push(nodeFor(d));
        if (hub && idOf(d) !== hub) {
          edges.push({ from: hub, to: idOf(d), color: { color: "#334155" }, width: 1 });
        }
      }
    }

    const container = document.getElementById("topology");
    const opts = {
      // We re-center on resize/zoom ourselves, so vis's own autoResize must be off or
      // it keeps a stale scale/offset and drifts.
      autoResize: false,
      nodes: { shape: "dot", size: 16, font: { color: "#e2e8f0", size: 13 }, borderWidth: 2 },
      edges: { smooth: { type: "continuous" } },
      physics: { stabilization: true, barnesHut: { gravitationalConstant: -8000, springLength: 130 } },
      interaction: {
        hover: true,
        tooltipDelay: 120,
        dragView: false,   // no panning -> the graph can't be dragged off-center
        zoomView: true,    // zoom stays enabled; the zoom handler keeps it centered
      },
    };
    if (network) network.destroy();
    network = new vis.Network(container, { nodes, edges }, opts);

    // Frame + center once physics settles, and immediately as a fallback.
    network.once("stabilizationIterationsDone", () => centerGraph(false));
    centerGraph(false);
    // Wheel-zoom in vis zooms toward the cursor, shifting the view; re-center after
    // each zoom (preserving the new scale) so it always grows/shrinks about the middle.
    network.on("zoom", () => centerGraph(true));
  }

  // Stable node id: MAC (lowercased) when known, else IP. Must match how the backend
  // keys uplink_mac so adjacency edges resolve.
  function idOf(d) {
    return d.mac ? d.mac.toLowerCase() : d.ip;
  }

  // Shape/colour per infrastructure role so the hierarchy reads at a glance.
  const ROLE_STYLE = {
    gateway: { shape: "diamond", size: 28, color: "#f59e0b" }, // amber
    switch:  { shape: "square",  size: 22, color: "#a78bfa" }, // violet
    ap:      { shape: "triangle", size: 20, color: "#22d3ee" }, // cyan
  };

  function nodeFor(d) {
    if (d.is_gateway || d.role === "gateway") return gatewayNode(d);
    const roleStyle = ROLE_STYLE[d.role];
    if (roleStyle) {
      return {
        id: idOf(d), label: d.label, shape: roleStyle.shape, size: roleStyle.size,
        color: { background: roleStyle.color, border: "#0f172a" },
        title: tooltip(d),
      };
    }
    const color = d.is_self ? "#34d399" : "#38bdf8";
    return {
      // Icon prefix on client labels; infra nodes already encode role via shape.
      id: idOf(d), label: `${deviceIcon(d)} ${d.label}`, shape: "dot",
      value: d.is_self ? 3 : 2,
      color: { background: color, border: "#0f172a" },
      title: tooltip(d),
    };
  }

  function gatewayNode(d) {
    return {
      id: idOf(d), label: d.label || "Gateway", shape: "diamond", size: 28,
      color: { background: "#f59e0b", border: "#0f172a" },
      title: tooltip(d),
    };
  }

  function tooltip(d) {
    const role = d.role ? d.role.toUpperCase() : null;
    return [d.label, role, d.ip, d.mac, d.vendor].filter(Boolean).join("\n");
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // ---- Exports --------------------------------------------------------------

  function fileSuffix() {
    const cidr = (lastData && lastData.network_cidr) || "";
    return cidr ? "-" + cidr.replace(/[^\w.-]/g, "_") : "";
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result).split(",", 2)[1]);
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
  }

  async function downloadBlob(blob, filename) {
    // Desktop app (pywebview): the <a download> trick just navigates the webview
    // to the blob, so hand the bytes to the native Save dialog instead.
    if (window.pywebview?.api?.save_file) {
      try {
        const res = await window.pywebview.api.save_file(filename, await blobToBase64(blob));
        if (res && res.ok === false && res.error) {
          meta.textContent = `⚠️ Save failed: ${res.error}`;
        }
        return;
      } catch (_e) { /* bridge hiccup -> fall back to the browser method */ }
    }
    // Browser mode: standard anchor download.
    const url = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement("a"), { href: url, download: filename });
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function csvCell(v) {
    v = v == null ? "" : String(v);
    return /[",\r\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
  }

  function exportCsv() {
    const devices = (lastData && lastData.devices) || [];
    if (!devices.length) return;
    const labelByMac = {};
    devices.forEach((d) => { if (d.mac) labelByMac[d.mac.toLowerCase()] = d.label; });
    const rows = [["Name", "IP", "MAC", "Vendor", "Role", "Connected To",
                   "Ping (ms)", "First Seen", "Notes"]];
    devices.forEach((d) => {
      const parent = d.uplink_mac ? (labelByMac[d.uplink_mac.toLowerCase()] || d.uplink_mac) : "";
      const firstSeen = d.first_seen ? new Date(d.first_seen * 1000).toISOString() : "";
      const ping = d.latency_ms == null ? "" : d.latency_ms.toFixed(1);
      rows.push([d.label, d.ip, d.mac, d.vendor, d.role, parent, ping, firstSeen, d.notes]);
    });
    // BOM so Excel reads UTF-8; CRLF line endings per RFC 4180.
    const csv = "\uFEFF" + rows.map((r) => r.map(csvCell).join(",")).join("\r\n");
    downloadBlob(new Blob([csv], { type: "text/csv;charset=utf-8" }), `network-devices${fileSuffix()}.csv`);
  }

  function exportPng() {
    if (!network) return;
    const src = topologyEl.querySelector("canvas");
    if (!src) return;
    // Frame the whole graph, then capture on the next frame once vis has redrawn.
    centerGraph(false);
    requestAnimationFrame(() => {
      const out = document.createElement("canvas");
      out.width = src.width;
      out.height = src.height;
      const ctx = out.getContext("2d");
      // vis draws on a transparent canvas; paint the panel background first.
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, out.width, out.height);
      ctx.drawImage(src, 0, 0);
      out.toBlob((blob) => blob && downloadBlob(blob, `network-topology${fileSuffix()}.png`), "image/png");
    });
  }
</script>
</body>
</html>
